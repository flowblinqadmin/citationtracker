services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: geo_e2e
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
    ports:
      - "5499:5432"
    healthcheck:
      test: pg_isready -U e2e -d geo_e2e
      interval: 2s
      retries: 15

  geo:
    build: .
    ports:
      - "3099:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SUPABASE_DATABASE_URL: postgres://e2e:e2e@db:5432/geo_e2e
      DATABASE_URL: postgres://e2e:e2e@db:5432/geo_e2e
      DATABASE_URL_DIRECT: postgres://e2e:e2e@db:5432/geo_e2e
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      NODE_ENV: production
